<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rv0x3l Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-screen" class="container">
        <div class="auth-box" id="login-box">
            <h2>Вход</h2>
            <input type="email" id="login-email" placeholder="Email" autocomplete="email">
            <input type="password" id="login-password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p class="switch-link" onclick="toggleAuthMode()">Вход по инвайту</p>
        </div>

        <div class="auth-box" id="register-box" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="reg-invite" placeholder="Инвайт-код">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Пароль (минимум 6 символов)">
            <button onclick="register()">Создать аккаунт</button>
            <p class="switch-link" onclick="toggleAuthMode()">Уже есть аккаунт?</p>
        </div>
    </div>

    <div id="chat-screen" class="container" style="display: none;">
        <header>
            <div class="header-info">
                <h2>Общий чат</h2>
                <span id="my-profile-name" class="profile-name" onclick="toggleProfileMenu()">Загрузка...</span>
            </div>
        </header>

        <div id="profile-menu" class="dropdown-menu" style="display: none;">
            <input type="text" id="edit-username" placeholder="Новый никнейм">
            <button class="small-btn" onclick="updateUsername()">Изменить ник</button>
            <div id="admin-panel" style="display: none;">
                <hr>
                <button class="small-btn admin-btn" onclick="generateInvite()">Создать инвайт</button>
            </div>
            <hr>
            <button class="small-btn danger-btn" onclick="logout()">Выйти</button>
        </div>

        <div id="messages-container"></div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
